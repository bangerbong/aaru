<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Day 1 - A Peanuts Story</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="scene-start" class="scene active">
            <div class="intro-card">
                <h1>Day 1</h1>
                <p id="typewriter"></p>
                <button id="start-btn" class="hidden">Enter the Garden</button>
            </div>
        </div>

        <div id="scene-game" class="scene hidden">
            <div id="viewport">
                <div id="world">
                    <div class="sky-bg"></div>
                    
                    <img src="Snoopyhouse.png" class="prop house" style="left: 700px;">

                    <div id="obstacles-layer"></div>
                    <div id="hearts-layer"></div>

                    <div id="woodstock-container" class="hidden">
                        <img src="Woodstock.png" class="woodstock-fly">
                        <div id="final-letter">✉️</div>
                    </div>

                    <img src="Snoopy_Peanuts.png" id="snoopy" class="sprite">
                    <img src="Girl.png" id="girl" class="sprite">
                </div>
                <div class="grass-floor"></div>
            </div>

            <div id="hud">❤️ <span id="score">0</span>/5</div>
            <div id="popup" class="hidden"><p id="popup-text"></p></div>

            <div class="controls">
                <div class="dpad">
                    <button id="left" class="btn">◀</button>
                    <button id="right" class="btn">▶</button>
                </div>
                <button id="jump" class="btn jump-btn">JUMP</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
