<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peanuts Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="scene-start" class="scene active">
            <div class="intro-card">
                <h1>Peanuts Adventure</h1>
                <p id="typewriter"></p>
                <div id="level-select" class="hidden">
                    <div class="day-grid">
                        <button class="day-btn" onclick="startLevel(1)">Day 1<br><span>Garden Walk</span></button>
                        <button class="day-btn" onclick="startLevel(2)">Day 2<br><span>Garden Defense</span></button>
                    </div>
                </div>
            </div>
        </div>

        <div id="scene-game" class="scene hidden">
            <div id="viewport">
                <div id="world">
                    <div class="sky-bg"></div>
                    <img src="Snoopyhouse.PNG" id="snoopy-house" class="prop house">
                    <div id="obstacles-layer"></div>
                    <div id="hearts-layer"></div>

                    <div id="pvz-grid" class="hidden">
                        <div class="lane" data-lane="0"></div>
                        <div class="lane" data-lane="1"></div>
                        <div class="lane" data-lane="2"></div>
                        <div class="lane" data-lane="3"></div>
                        <div class="lane" data-lane="4"></div>
                    </div>

                    <div id="woodstock-container" class="hidden">
                        <img src="Woodstock.png" class="woodstock-fly">
                        <div id="final-letter">✉️</div>
                    </div>

                    <img src="Snoopy_Peanuts.png" id="snoopy" class="sprite">
                    <img src="Girl.png" id="girl" class="sprite">
                </div>
            </div>

            <div id="hud">❤️ <span id="score-val">0</span></div>
            
            <div id="pvz-ui" class="hidden">
                <div class="seed-card" onclick="selectWoodstock()">
                    <div class="seed-img-wrap"><img src="Woodstock.png"></div>
                    <div class="cost-tag">50</div>
                </div>
            </div>

            <div id="controls-d1" class="controls">
                <div class="dpad">
                    <button id="left" class="btn">◀</button>
                    <button id="right" class="btn">▶</button>
                </div>
                <button id="jump" class="btn jump-btn">JUMP</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
