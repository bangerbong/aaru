<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Day 1 - A New Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="scene-start" class="scene active bg-black">
            <div class="content-center">
                <p id="start-text" class="typewriter-text"></p>
                <button id="start-btn" class="pixel-btn hidden">Enter World</button>
            </div>
        </div>

        <div id="scene-game" class="scene hidden">
            <div class="world-container">
                <div class="sky-bg">
                    <div class="sun"></div>
                </div>
                
                <div class="play-area" id="play-area">
                    <div id="heart-count">❤️ 0/5</div>
                    
                    <div id="dog" class="character dog">
                        <div class="d-head"><div class="d-ear"></div><div class="d-nose"></div></div>
                        <div class="d-body"></div>
                        <div class="d-legs"><div class="d-leg"></div><div class="d-leg"></div></div>
                    </div>

                    <div id="girl" class="character girl">
                        <div class="g-hair"></div>
                        <div class="g-head"><div class="g-blush"></div><div class="g-eyes"></div></div>
                        <div class="g-body"></div>
                        <div class="g-legs"><div class="g-leg"></div><div class="g-leg"></div></div>
                    </div>
                </div>
            </div>

            <div id="mobile-controls">
                <div class="d-pad">
                    <button id="btn-up" class="ctrl-btn">▲</button>
                    <div class="mid-row">
                        <button id="btn-left" class="ctrl-btn">◀</button>
                        <button id="btn-right" class="ctrl-btn">▶</button>
                    </div>
                    <button id="btn-down" class="ctrl-btn">▼</button>
                </div>
            </div>
        </div>

        <div id="scene-letter" class="scene overlay hidden">
            <div class="letter-box">
                <div class="envelope-icon">💌</div>
                <p id="letter-text" class="typewriter-text text-dark"></p>
                <button id="close-btn" class="pixel-btn hidden">See you tomorrow</button>
            </div>
        </div>

        <div id="scene-end" class="scene hidden bg-black">
            <div class="content-center">
                <p class="typewriter-text">Day 2 is locked.<br>Come back tomorrow.</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
