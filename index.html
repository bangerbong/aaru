<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aaru’s Adventure</title>
    <!-- Google Fonts for that playful UI look -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Start Menu -->
        <div id="scene-start" class="scene active">
            <div class="intro-card">
                <h1>Aaru’s Adventure</h1>
                <p id="typewriter"></p>
                <div id="level-select" class="hidden">
                    <div class="day-grid">
                        <button class="day-btn" onclick="startLevel(1)">Day 1<br><span>Garden Walk</span></button>
                        <button class="day-btn" onclick="startLevel(2)">Day 2<br><span>Garden Defense</span></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Game Scene -->
        <div id="scene-game" class="scene hidden">
            <div id="viewport">
                <div id="world">
                    <div class="sky-bg"></div>
                    <!-- The home base Snoopy protects -->
                    <img src="Snoopyhouse.PNG" id="snoopy-house" class="prop house">
                    
                    <div id="obstacles-layer"></div>
                    <div id="hearts-layer"></div>

                    <!-- The 5-lane defense grid for Day 2 -->
                    <div id="pvz-grid" class="hidden">
                        <div class="lane" data-lane="0"></div>
                        <div class="lane" data-lane="1"></div>
                        <div class="lane" data-lane="2"></div>
                        <div class="lane" data-lane="3"></div>
                        <div class="lane" data-lane="4"></div>
                    </div>

                    <!-- Sprites -->
                    <img src="Snoopy_Peanuts.png" id="snoopy" class="sprite">
                    <img src="Girl.png" id="girl" class="sprite">
                </div>
                <div id="floor" class="grass-floor"></div>
            </div>

            <!-- HUD: Tap this for extra hearts! -->
            <div id="hud">❤️ <span id="score-val">100</span></div>
            
            <!-- Woodstock Selection Card -->
            <div id="pvz-ui" class="hidden">
                <div class="seed-card" onclick="selectWoodstock()">
                    <div class="seed-img-wrap">
                        <img src="Woodstock.png" alt="Woodstock">
                    </div>
                    <div class="cost-tag">50</div>
                </div>
            </div>

            <!-- Mobile Controls for Day 1 -->
            <div id="controls-d1" class="controls">
                <div class="dpad">
                    <button id="left" class="btn">◀</button>
                    <button id="right" class="btn">▶</button>
                </div>
                <button id="jump" class="btn jump-btn">JUMP</button>
            </div>
        </div>
    </div>

    <!-- Final JS hooks everything together -->
    <script src="script.js"></script>
</body>
</html>
